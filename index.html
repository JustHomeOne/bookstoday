<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Books Today - онлайн библиотека</title>
  <link rel="stylesheet" href="styles.css?v=20260614-8" />
</head>
<body>
  <header class="site-header">
    <div class="container header-grid">
      <div>
        <p class="eyebrow">Онлайн библиотека</p>
        <h1>Books Today</h1>
        <p>Книги в EPUB, MOBI и TXT: скачивайте нужный формат или читайте текст прямо на сайте.</p>
      </div>
      <nav class="top-actions" aria-label="Основная навигация">
        <a class="btn outline light" href="auth.html">Вход</a>
        <a class="btn outline light" href="convert.html">Конвертер</a>
        <a class="btn light" href="add.html">Добавить книгу</a>
      </nav>
    </div>
  </header>

  <main class="container">
    <section class="toolbar" aria-label="Фильтры каталога">
      <div class="field-group">
        <label for="search-query">Поиск</label>
        <input id="search-query" type="search" placeholder="Название, автор, ISBN" />
      </div>
      <div class="field-group">
        <label for="filter-format">Формат</label>
        <select id="filter-format">
          <option value="">Все форматы</option>
          <option value="epub">EPUB</option>
          <option value="mobi">MOBI</option>
          <option value="txt">TXT</option>
        </select>
      </div>
      <div class="field-group">
        <label for="filter-year-min">Год от</label>
        <input id="filter-year-min" type="number" min="0" placeholder="2000" />
      </div>
      <div class="field-group">
        <label for="filter-year-max">Год до</label>
        <input id="filter-year-max" type="number" min="0" placeholder="2026" />
      </div>
      <button id="clear-filters" class="btn outline" type="button">Сбросить</button>
    </section>

    <section class="section-heading">
      <div>
        <h2>Каталог книг</h2>
        <p id="count-text">Загрузка списка...</p>
      </div>
    </section>

    <section id="books-grid" class="books-grid" aria-live="polite"></section>

    <section id="empty-message" class="empty-state">
      <h2>Пока нет книг</h2>
      <p>Добавьте первую книгу и файл. После сохранения она появится в каталоге.</p>
      <a class="btn" href="add.html">Добавить книгу</a>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase-config.js?v=20260614-8"></script>
  <script src="supabase-api.js?v=20260614-8"></script>
  <script src="index.js?v=20260614-8"></script>
</body>
</html>
