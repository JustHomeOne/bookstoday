<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Читать книгу - Books Today</title>
  <link rel="stylesheet" href="styles.css?v=20260619-1" />
</head>
<body class="reader-page">
  <header class="site-header compact reader-header">
    <div class="container header-grid">
      <div>
        <p class="eyebrow">Режим чтения</p>
        <h1 id="reader-title">Книга</h1>
        <p>Спокойная страница, главы, прогресс и сохранение места чтения на этом устройстве.</p>
      </div>
      <nav class="top-actions" aria-label="Основная навигация">
        <a class="btn outline light" href="index.html">Каталог</a>
      </nav>
    </div>
  </header>

  <main class="container reader-layout">
    <aside class="reader-sidebar" aria-label="Навигация по книге">
      <label for="chapter-select">Глава</label>
      <select id="chapter-select"></select>

      <div class="reader-progress">
        <span id="chapter-counter">Глава 1 из 1</span>
        <div class="progress-track" aria-hidden="true">
          <div id="progress-bar" class="progress-bar"></div>
        </div>
      </div>

      <div class="reader-controls">
        <button id="prev-chapter" class="btn outline" type="button">Назад</button>
        <button id="next-chapter" class="btn" type="button">Дальше</button>
      </div>

      <div class="reader-account">
        <p id="reader-user-status" class="muted">Войдите, чтобы сохранять заметки между устройствами.</p>
        <a id="reader-login-link" class="format-link read-link" href="auth.html">Войти</a>
      </div>

      <form id="note-form" class="note-form" hidden>
        <label for="note-text">Заметка к текущей главе</label>
        <textarea id="note-text" rows="4" placeholder="Мысль, цитата или пометка..."></textarea>
        <button class="btn" type="submit">Сохранить заметку</button>
      </form>

      <div id="notes-list" class="notes-list" hidden></div>
    </aside>

    <article class="reader-card">
      <p id="reader-status" class="muted">Загрузка текста...</p>
      <h2 id="chapter-title" class="chapter-title"></h2>
      <pre id="reader-text"></pre>
    </article>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase-config.js?v=20260614-8"></script>
  <script src="supabase-api.js?v=20260619-1"></script>
  <script src="read.js?v=20260619-1"></script>
</body>
</html>
