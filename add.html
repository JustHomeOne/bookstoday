<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Добавить книгу - Books Today</title>
  <link rel="stylesheet" href="styles.css?v=20260615-1" />
</head>
<body>
  <header class="site-header compact">
    <div class="container header-grid">
      <div>
        <p class="eyebrow">Загрузка книги</p>
        <h1>Добавить книгу</h1>
        <p>Загрузите файл в EPUB, MOBI или TXT. Сайт автоматически подготовит остальные форматы для скачивания и чтения.</p>
      </div>
      <nav class="top-actions" aria-label="Основная навигация">
        <a class="btn outline light" href="index.html">Каталог</a>
      </nav>
    </div>
  </header>

  <main class="container narrow">
    <section class="card">
      <div class="notice">
        <strong>Автоконвертация включена</strong>
        После загрузки сервер создаст EPUB, MOBI и TXT. TXT можно скачать и читать прямо на сайте.
      </div>

      <form id="book-form">
        <div class="metadata-import">
          <div class="field-group">
            <label for="sourceUrl">Ссылка на страницу книги</label>
            <input id="sourceUrl" name="sourceUrl" type="url" placeholder="https://fantasy-worlds.org/lib/id19869/" />
          </div>
          <button id="import-metadata" type="button" class="btn outline">Заполнить данные</button>
        </div>

        <div class="field-group">
          <label for="title">Название</label>
          <input id="title" name="title" type="text" required />
        </div>

        <div class="field-group">
          <label for="author">Автор</label>
          <input id="author" name="author" type="text" required />
        </div>

        <div class="field-row">
          <div class="field-group">
            <label for="year">Год</label>
            <input id="year" name="year" type="number" min="0" max="2100" />
          </div>
          <div class="field-group">
            <label for="isbn">ISBN</label>
            <input id="isbn" name="isbn" type="text" />
          </div>
        </div>

        <div class="field-group">
          <label for="description">Описание</label>
          <textarea id="description" name="description" rows="4" placeholder="Краткое описание книги"></textarea>
        </div>

        <div class="field-group">
          <label for="bookFile">Файл книги</label>
          <input id="bookFile" name="bookFile" type="file" accept=".epub,.mobi,.txt" required />
        </div>

        <button type="submit" class="btn">Загрузить и конвертировать</button>
      </form>
      <p id="status" class="status"></p>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase-config.js?v=20260614-8"></script>
  <script src="converter-config.js?v=20260614-8"></script>
  <script src="supabase-api.js?v=20260614-12"></script>
  <script src="script.js?v=20260615-1"></script>
</body>
</html>
