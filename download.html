<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Скачивание книги - Books Today</title>
  <link rel="stylesheet" href="styles.css?v=20260614-7" />
</head>
<body>
  <header class="site-header compact">
    <div class="container header-grid">
      <div>
        <p class="eyebrow">Скачивание</p>
        <h1 id="download-title">Подготовка файла</h1>
        <p id="download-subtitle">Перед скачиванием будет показан рекламный блок.</p>
      </div>
      <nav class="top-actions" aria-label="Основная навигация">
        <a class="btn outline light" href="index.html">Назад в каталог</a>
      </nav>
    </div>
  </header>

  <main class="container narrow">
    <section class="card download-card">
      <div class="ad-box">
        <p class="ad-label">Реклама</p>
        <div class="ad-placeholder">
          Здесь будет рекламный блок Google AdSense после подключения монетизации.
        </div>
      </div>

      <p id="timer-text" class="timer-text">Кнопка скачивания появится через 7 секунд.</p>
      <button id="download-link" class="btn disabled" type="button" aria-disabled="true">Скачать книгу</button>
      <p class="muted">Файл будет сохранён с правильным расширением: EPUB, MOBI или TXT.</p>
    </section>
  </main>

  <script src="download.js?v=20260614-7"></script>
</body>
</html>
